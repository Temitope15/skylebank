version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skylebank-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skylebank_user
      POSTGRES_PASSWORD: skylebank_secure_password
      POSTGRES_DB: skylebank_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skylebank_user -d skylebank_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skylebank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: skylebank-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # HTTP Web UI port
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
