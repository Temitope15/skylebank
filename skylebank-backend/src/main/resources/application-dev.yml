spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skylebank_db}
    username: ${DB_USERNAME:skylebank_user}
    password: ${DB_PASSWORD:skylebank_secure_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=10m,maximumSize=1000

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    com.skylebank.api: DEBUG
    org.hibernate.SQL: DEBUG

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLWp3dC1zZWNyZXQta2V5LTMyLWJ5dGVz}
      expiration-ms: ${JWT_EXPIRATION_MS:900000} # 15 minutes
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
